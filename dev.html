<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1e64">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Geometry Web — DEV</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="game-canvas" width="1280" height="720"></canvas>

    <!-- ======= LOBBY ======= -->
    <div class="screen active" id="screen-lobby">
      <div class="menu-bg"></div>
      <div id="lobby-title" class="gd-title">GEOMETRY WEB</div>
      <div id="lobby-buttons">
        <button class="round-btn mid" id="btn-garage" title="Кубики">
          <canvas id="garage-btn-icon" width="76" height="76"></canvas>
        </button>
        <button class="round-btn big" id="btn-play" title="Играть">
          <svg width="110" height="110" viewBox="0 0 100 100">
            <polygon points="22,10 92,50 22,90" fill="#fff" stroke="#000" stroke-width="7" stroke-linejoin="round"/>
          </svg>
        </button>
        <span id="lobby-right-slot">
          <button class="round-btn mid" id="btn-editor" title="Редактор">
            <svg width="76" height="76" viewBox="0 0 100 100">
              <g transform="rotate(45 50 50)">
                <rect x="42" y="12" width="16" height="34" rx="3" fill="#c9c9c9" stroke="#000" stroke-width="5"/>
                <rect x="26" y="8" width="48" height="18" rx="5" fill="#8a8a8a" stroke="#000" stroke-width="5"/>
                <rect x="44" y="44" width="12" height="46" rx="4" fill="#a06a2c" stroke="#000" stroke-width="5"/>
              </g>
            </svg>
          </button>
          <button class="round-btn mid" id="btn-map" title="Карта прохождений">
            <svg width="70" height="70" viewBox="0 0 100 100">
              <path d="M14 26 L38 16 L62 26 L86 16 L86 74 L62 84 L38 74 L14 84 Z" fill="#e8e4d0" stroke="#000" stroke-width="6" stroke-linejoin="round"/>
              <path d="M38 16 L38 74 M62 26 L62 84" stroke="#000" stroke-width="5"/>
              <circle cx="50" cy="46" r="8" fill="#e83a3a" stroke="#000" stroke-width="4"/>
            </svg>
          </button>
        </span>
      </div>
      <div id="lobby-version" class="gd-text">v1.2</div>
      <button class="corner-btn" id="btn-settings" style="bottom:14px;top:auto" title="Настройки">
        <svg width="44" height="44" viewBox="0 0 100 100">
          <g fill="#c9c9c9" stroke="#000" stroke-width="5">
            <rect x="43" y="8" width="14" height="84" rx="4"/>
            <rect x="43" y="8" width="14" height="84" rx="4" transform="rotate(45 50 50)"/>
            <rect x="43" y="8" width="14" height="84" rx="4" transform="rotate(90 50 50)"/>
            <rect x="43" y="8" width="14" height="84" rx="4" transform="rotate(135 50 50)"/>
            <circle cx="50" cy="50" r="24"/>
            <circle cx="50" cy="50" r="10" fill="#5a5a5a"/>
          </g>
        </svg>
      </button>

      <!-- настройки -->
      <div class="overlay" id="overlay-settings">
        <div class="panel">
          <h2 class="gd-title" style="font-size:36px">НАСТРОЙКИ</h2>
          <div class="set-row"><span class="gd-text">Музыка</span>
            <input type="range" id="set-music" min="0" max="1" step="0.05" value="0.5"></div>
          <div class="set-row"><span class="gd-text">Звуки</span>
            <input type="range" id="set-sfx" min="0" max="1" step="0.05" value="1"></div>
          <div class="set-row"><span class="gd-text">Прятать мышь в игре</span>
            <button class="set-toggle" id="set-cursor"><i></i></button></div>
          <div class="icon-row" style="margin-top:24px">
            <button class="icon-btn" id="settings-close" title="Закрыть">
              <svg viewBox="0 0 100 100"><path d="M22 52 L42 72 L78 30" fill="none" stroke="#fff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div id="lobby-devtag" class="gd-text">DEV-версия</div>

    </div>


    <!-- ======= MAP (карта прохождений) ======= -->
    <div class="screen" id="screen-map">
      <div id="map-bg"></div>
      <button class="corner-btn" id="map-back" style="top:16px;left:16px" title="Назад">
        <svg width="40" height="40" viewBox="0 0 100 100"><polygon points="78,12 22,50 78,88" fill="#fff" stroke="#000" stroke-width="8" stroke-linejoin="round"/></svg>
      </button>
      <div class="gd-title" id="map-title">КАРТА</div>
      <div id="map-float">
        <svg id="map-path" viewBox="0 0 1280 720" preserveAspectRatio="none">
          <!-- летающий остров -->
          <path d="M 235 428 Q 320 400 420 406 Q 640 378 880 404 Q 990 400 1075 428 L 1020 470 Q 930 505 860 550 Q 775 615 695 650 Q 635 605 555 572 Q 455 532 375 500 Q 295 468 235 428 Z"
                fill="#6b4a2c" stroke="#000" stroke-width="6" stroke-linejoin="round"/>
          <path d="M 235 428 Q 320 400 420 406 Q 640 378 880 404 Q 990 400 1075 428 L 1052 448 Q 640 414 258 448 Z"
                fill="#4fce4f" stroke="#000" stroke-width="5" stroke-linejoin="round"/>
          <!-- парящие обломки под островом -->
          <path d="M 360 660 l 56 -18 l 46 20 l -50 28 z" fill="#5a3f26" stroke="#000" stroke-width="4"/>
          <path d="M 900 688 l 42 -14 l 34 17 l -38 21 z" fill="#5a3f26" stroke="#000" stroke-width="4"/>
          <!-- тропа между узлами -->
          <path d="M 320 415 C 380 402, 440 396, 500 398 S 630 403, 690 400 S 810 386, 870 390 S 970 398, 1030 408"
                fill="none" stroke="rgba(125,232,255,.75)" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 18"/>
        </svg>
        <div id="map-nodes"></div>
      </div>
    </div>

    <!-- ======= GARAGE (icon select) ======= -->
    <div class="screen" id="screen-garage">
      <div class="menu-bg"></div>
      <button class="corner-btn" id="garage-back" style="top:16px;left:16px" title="Назад">
        <svg width="40" height="40" viewBox="0 0 100 100"><polygon points="78,12 22,50 78,88" fill="#fff" stroke="#000" stroke-width="8" stroke-linejoin="round"/></svg>
      </button>
      <div id="garage-panel">
        <div class="gd-title" style="font-size:44px">ВЫБЕРИ КУБИК</div>
        <canvas id="garage-preview" width="130" height="130"></canvas>
        <div id="icon-grid"></div>
      </div>
    </div>

    <!-- ======= LEVEL SELECT ======= -->
    <div class="screen" id="screen-levels">
      <div class="menu-bg"></div>
      <button class="corner-btn" id="levels-back" style="top:16px;left:16px" title="Назад">
        <svg width="40" height="40" viewBox="0 0 100 100"><polygon points="78,12 22,50 78,88" fill="#fff" stroke="#000" stroke-width="8" stroke-linejoin="round"/></svg>
      </button>
      <button class="arrow-btn" id="lvl-prev">
        <svg width="90" height="110" viewBox="0 0 100 110"><polygon points="85,8 15,55 85,102" fill="#fff" stroke="#000" stroke-width="9" stroke-linejoin="round"/></svg>
      </button>
      <button class="arrow-btn" id="lvl-next">
        <svg width="90" height="110" viewBox="0 0 100 110"><polygon points="15,8 85,55 15,102" fill="#fff" stroke="#000" stroke-width="9" stroke-linejoin="round"/></svg>
      </button>
      <div id="level-card">
        <div id="level-diff">
          <canvas id="level-diff-face" width="64" height="64"></canvas>
          <span id="level-diff-name" class="gd-text"></span>
        </div>
        <button id="btn-info" title="Об уровне">
          <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#fff" stroke-width="9"/><rect x="43" y="42" width="14" height="34" rx="6" fill="#fff"/><circle cx="50" cy="27" r="8.5" fill="#fff"/></svg>
        </button>
        <div id="level-name" class="gd-title">Level 1</div>
        <div class="progress-row">
          <span class="label gd-text">Обычный режим</span>
          <div class="pbar" id="pbar-normal"><i></i><span>0%</span></div>
        </div>
        <div class="progress-row">
          <span class="label gd-text">Практика</span>
          <div class="pbar" id="pbar-practice"><i></i><span>0%</span></div>
        </div>
        <div id="level-coins"></div>
      </div>
      <div id="level-page-dots"></div>

      <!-- инфо об уровне -->
      <div class="overlay" id="overlay-info">
        <div class="panel">
          <h2 class="gd-title" style="font-size:36px" id="info-title">Уровень</h2>
          <div id="info-rows" class="gd-text"></div>
          <div class="icon-row">
            <button class="icon-btn" id="info-close" title="Закрыть">
              <svg viewBox="0 0 100 100"><path d="M28 28 L72 72 M72 28 L28 72" stroke="#fff" stroke-width="14" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ======= GAME HUD ======= -->
    <div class="screen" id="screen-game">
      <div id="hud-progress"><i></i></div>
      <div id="hud-percent" class="gd-text">0%</div>
      <div id="hud-practice-tag" class="gd-text">ПРАКТИКА</div>
      <button id="hud-pause" title="Пауза"><i></i><i></i></button>
      <div id="hud-practice-btns">
        <button id="btn-checkpoint">+<br>чекпоинт</button>
        <button id="btn-delcheck">−<br>удалить</button>
      </div>

      <!-- pause -->
      <div class="overlay" id="overlay-pause">
        <div class="panel">
          <h2 class="gd-title">ПАУЗА</h2>
          <div class="icon-row">
            <button class="icon-btn" id="pause-restart" title="Начать заново">
              <svg viewBox="0 0 100 100"><path d="M76 42 A30 30 0 1 0 78 60" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round"/><polygon points="86,22 90,50 62,42" fill="#fff"/></svg>
            </button>
            <button class="icon-btn big" id="pause-resume" title="Продолжить">
              <svg viewBox="0 0 100 100"><polygon points="34,20 82,50 34,80" fill="#fff" stroke="#fff" stroke-width="6" stroke-linejoin="round"/></svg>
            </button>
            <button class="icon-btn toggle" id="pause-practice" title="Режим практики (вкл/выкл)">
              <svg viewBox="0 0 100 100"><rect x="30" y="30" width="40" height="40" fill="#3cff6e" stroke="#fff" stroke-width="8" transform="rotate(45 50 50)"/></svg>
            </button>
            <button class="icon-btn red" id="pause-exit" title="Выйти из уровня">
              <svg viewBox="0 0 100 100"><path d="M28 28 L72 72 M72 28 L28 72" stroke="#fff" stroke-width="14" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="pause-practice-hint" class="gd-text">Ромб — практика: Z — чекпоинт, X — удалить</div>
        </div>
      </div>

      <!-- level complete -->
      <div class="overlay" id="overlay-complete">
        <div class="panel">
          <h2 class="gd-title" id="complete-title">УРОВЕНЬ ПРОЙДЕН!</h2>
          <div id="complete-stats" class="gd-text"></div>
          <div id="complete-coins"></div>
          <div class="icon-row">
            <button class="icon-btn" id="complete-replay" title="Ещё раз">
              <svg viewBox="0 0 100 100"><path d="M76 42 A30 30 0 1 0 78 60" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round"/><polygon points="86,22 90,50 62,42" fill="#fff"/></svg>
            </button>
            <button class="icon-btn red" id="complete-exit" title="Выход">
              <svg viewBox="0 0 100 100"><path d="M28 28 L72 72 M72 28 L28 72" stroke="#fff" stroke-width="14" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ======= EDITOR ======= -->
    <div class="screen" id="screen-editor">
      <canvas id="editor-canvas" width="1280" height="720"></canvas>

      <div id="editor-topbar">
        <button class="ed-btn red" id="ed-back">← Выход</button>
        <input type="text" id="ed-name" placeholder="Название уровня" value="Мой уровень">
        <span id="ed-bgcolor-wrap" class="gd-text" style="font-size:13px">Фон:
          <input type="color" id="ed-bgcolor" value="#287dff">
        </span>
        <button class="ed-btn blue" id="ed-music">♫ Музыка</button>
        <span id="ed-music-name">нет музыки</span>
        <input type="file" id="ed-music-file" accept="audio/*" style="display:none">
        <span style="flex-basis:100%"></span>
        <button class="ed-btn green" id="ed-play">▶ Тест с начала</button>
        <button class="ed-btn" id="ed-save">Сохранить</button>
        <button class="ed-btn orange" id="ed-export">⤓ Экспорт</button>
        <button class="ed-btn" id="ed-import">Импорт</button>
        <input type="file" id="ed-import-file" accept=".json,.gwlevel" style="display:none">
        <button class="ed-btn" id="ed-grid">Сетка: вкл</button>
        <button class="ed-btn red" id="ed-clear">Очистить</button>
      </div>

      <!-- левая стопка: отмена/повтор/копировать/вставить -->
      <div id="ed-stack">
        <button class="stack-btn" id="ed-undo" title="Отменить (Ctrl+Z)">
          <svg viewBox="0 0 100 100"><path d="M38 26 L16 48 L38 70" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><path d="M16 48 H62 A22 22 0 0 1 62 92 H50" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round"/></svg>
        </button>
        <button class="stack-btn" id="ed-redo" title="Вернуть (Ctrl+Y)">
          <svg viewBox="0 0 100 100"><path d="M62 26 L84 48 L62 70" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><path d="M84 48 H38 A22 22 0 0 0 38 92 H50" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round"/></svg>
        </button>
        <button class="stack-btn" id="ed-copy" title="Копировать (Ctrl+C)">
          <svg viewBox="0 0 100 100"><rect x="18" y="18" width="46" height="56" rx="6" fill="none" stroke="#fff" stroke-width="9"/><rect x="38" y="32" width="46" height="56" rx="6" fill="#2b3242" stroke="#fff" stroke-width="9"/></svg>
        </button>
        <button class="stack-btn" id="ed-paste" title="Вставить (Ctrl+V)">
          <svg viewBox="0 0 100 100"><rect x="24" y="20" width="52" height="66" rx="7" fill="none" stroke="#fff" stroke-width="9"/><rect x="38" y="10" width="24" height="16" rx="4" fill="#fff"/><path d="M36 50 H64 M36 64 H58" stroke="#fff" stroke-width="7" stroke-linecap="round"/></svg>
        </button>
      </div>

      <!-- тест из редактора -->
      <button id="ed-testplay" title="Тест с этого места">
        <svg viewBox="0 0 100 100"><polygon points="30,16 84,50 30,84" fill="#fff" stroke="#000" stroke-width="7" stroke-linejoin="round"/></svg>
      </button>
      <button id="ed-teststop" title="Остановить тест (Esc)">
        <svg viewBox="0 0 100 100"><rect x="24" y="24" width="52" height="52" rx="8" fill="#fff" stroke="#000" stroke-width="7"/></svg>
      </button>

      <!-- полоса быстрой навигации -->
      <div id="ed-slider-wrap">
        <input type="range" id="ed-slider" min="-3" max="300" step="1" value="-3">
      </div>

      <div id="ed-status" class="gd-text"></div>

      <!-- инспектор выбранного -->
      <div id="ed-inspector">
        <b class="gd-text" style="font-size:15px" id="insp-title">Объект</b>
        <span id="insp-pos"></span>
        <div class="insp-row" id="insp-rot-row">
          <span>Поворот:</span>
          <button class="insp-btn" id="insp-rotl" title="Повернуть влево">⟲</button>
          <button class="insp-btn" id="insp-rotr" title="Повернуть вправо">⟳</button>
          <span id="insp-rot-val">0°</span>
        </div>
        <div class="insp-row" id="insp-size-row">
          <span>Размер:</span>
          <button class="insp-btn" id="insp-sizedn">−</button>
          <span id="insp-size-val">1</span>
          <button class="insp-btn" id="insp-sizeup">+</button>
        </div>
        <label class="insp-row" id="insp-group-row">Группа: <input type="number" id="insp-group" min="0" max="99" value="0"></label>
        <label class="insp-row" id="insp-color-row">Цвет: <input type="color" id="insp-color" value="#ff00ff"></label>
        <label class="insp-row" id="insp-dur-row">Переход, сек: <input type="number" id="insp-dur" min="0" max="10" step="0.5" value="1"></label>
        <div id="insp-move-rows">
          <label class="insp-row">Двигать группу: <input type="number" id="insp-target" min="1" max="99" value="1"></label>
          <label class="insp-row">Сдвиг X (блоки): <input type="number" id="insp-dx" step="1" value="0"></label>
          <label class="insp-row">Сдвиг Y (блоки): <input type="number" id="insp-dy" step="1" value="0"></label>
          <label class="insp-row">Время, сек: <input type="number" id="insp-mdur" min="0" max="10" step="0.5" value="1"></label>
        </div>
        <button class="ed-btn red" id="insp-del">Удалить</button>
      </div>

      <div id="editor-bottombar">
        <div id="ed-mode-tabs">
          <button class="ed-tab on" data-mode="build">Строить</button>
          <button class="ed-tab" data-mode="edit">Двигать</button>
          <button class="ed-tab" data-mode="delete">Удалять</button>
        </div>
        <div id="ed-pal-wrap">
          <div id="ed-pal-tabs"></div>
          <div id="ed-palette"></div>
        </div>
        <div id="ed-hint" class="gd-text"></div>
      </div>
    </div>

    <div id="rotate-hint"><div class="gd-title" style="font-size:34px">ПОВЕРНИ ТЕЛЕФОН</div><div class="gd-text" style="font-size:52px">📱⟳</div></div>
    <div id="toast"></div>
    <div id="fader"></div>
  </div>
</div>

<script>window.DEV_MODE = true;</script>
<script src="js/level1-data.js"></script>
<script src="js/levels.js"></script>
<script src="js/map-levels.js"></script>
<script src="js/engine.js"></script>
<script src="js/main.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
